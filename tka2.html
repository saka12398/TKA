<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TKA | Bahasa Indonesia - Latihan Olimpiade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #fefce8;
            padding: 12px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* Hero - lebih ramping */
        .hero {
            background: #1e3a5f;
            padding: 20px 16px;
            text-align: center;
        }

        .hero h1 {
            font-size: 1.4rem;
            color: white;
            font-weight: 600;
        }

        .hero h1 span {
            background: #facc15;
            color: #1e3a5f;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-left: 8px;
        }

        .hero p {
            font-size: 0.65rem;
            color: #a5b4fc;
            margin-top: 6px;
        }

        /* INFO BAR - MINIMALIS */
        .info-bar {
            background: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eef2ff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .score-card {
            background: #1e3a5f;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #facc15;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .btn {
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-home {
            background: #64748b;
            color: white;
            text-decoration: none;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-info { background: #8b5cf6; color: white; }
        .btn-warning { background: #ef4444; color: white; }

        .btn:active { transform: scale(0.95); }

        /* Soal Grid */
        .quiz-grid {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .question-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #eef2ff;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #fafaf5;
            border-bottom: 1px solid #f0f0e8;
            flex-wrap: wrap;
        }

        .num-badge {
            width: 28px;
            height: 28px;
            background: #1e3a5f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .kompetensi-tag, .teks-tag {
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 500;
        }

        .kompetensi-tag { background: #dbeafe; color: #1e40af; }
        .teks-tag { background: #fef3c7; color: #b45309; }

        /* Teks bacaan */
        .reading-text {
            background: #fafaf5;
            margin: 12px;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #334155;
            border-left: 3px solid #facc15;
        }

        .question-text {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0 12px 8px;
            color: #0c4a6e;
        }

        /* Options */
        .options {
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        .option input {
            width: 16px;
            height: 16px;
            accent-color: #facc15;
        }

        .option label {
            font-size: 0.75rem;
            color: #334155;
            cursor: pointer;
            flex: 1;
        }

        /* Tombol Vertikal */
        .button-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px;
        }

        .check-btn, .pembahasan-btn {
            padding: 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .check-btn { background: #3b82f6; color: white; }
        .pembahasan-btn { background: #f59e0b; color: white; }

        .feedback-area {
            padding: 0 12px 12px;
        }

        .result-correct {
            background: #d1fae5;
            color: #065f46;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-bottom: 8px;
        }

        .result-wrong {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-bottom: 8px;
        }

        .result-warning {
            background: #fef3c7;
            color: #92400e;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .explanation-box {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            line-height: 1.5;
        }

        .footer-note {
            background: #f8fafc;
            text-align: center;
            padding: 12px;
            font-size: 0.6rem;
            color: #64748b;
            border-top: 1px solid #eef2ff;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 24px;
            overflow: hidden;
        }

        .modal-header {
            background: #1e3a5f;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 { font-size: 1rem; }
        .close-modal { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .modal-body { padding: 16px; max-height: 60vh; overflow-y: auto; }
        .answer-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .answer-item { background: #f1f5f9; padding: 6px 10px; border-radius: 10px; display: flex; justify-content: space-between; font-size: 0.7rem; }

        /* Toast */
        .toast-save {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            color: #facc15;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.6rem;
            z-index: 99;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        /* Scroll top */
        .scroll-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #facc15;
            cursor: pointer;
            z-index: 99;
            font-size: 1.2rem;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f2b44;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 0.5s;
        }

        .splash-content {
            text-align: center;
        }

        .splash-logo {
            width: 80px;
            height: 80px;
            background: #facc15;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 40px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .splash-title {
            font-size: 1.3rem;
            color: #facc15;
        }

        .splash-sub {
            font-size: 0.7rem;
            color: #a5b4fc;
            margin-top: 4px;
        }

        .splash-loader {
            width: 180px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .splash-loader-fill {
            width: 0%;
            height: 100%;
            background: #facc15;
            animation: loadAnim 2s ease-out forwards;
        }

        @keyframes loadAnim {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        @media (max-width: 500px) {
            body { padding: 8px; }
            .hero h1 { font-size: 1.2rem; }
            .score-card { font-size: 0.65rem; padding: 4px 10px; }
            .btn { padding: 4px 8px; font-size: 0.6rem; }
            .question-text { font-size: 0.8rem; }
            .option label { font-size: 0.7rem; }
            .answer-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="splash-content">
        <div class="splash-logo">📖</div>
        <h1 class="splash-title">TKA BAHASA INDONESIA</h1>
        <p class="splash-sub">40 SOAL • LATIHAN OLIMPIADE</p>
        <div class="splash-loader"><div class="splash-loader-fill"></div></div>
    </div>
</div>

<div class="container">
    <div class="hero">
        <h1>📖 TKA B.INDONESIA <span>40 SOAL</span></h1>
        <p>Pemahaman Tekstual • Inferensial • Evaluasi & Apresiasi</p>
    </div>

    <div class="info-bar">
        <div class="score-card" id="liveScoreDisplay">🏆 0/40</div>
        <div class="btn-group">
            <a href="index.html" class="btn btn-home">🏠HOME</a>
            <button class="btn btn-primary" id="checkAllBtn">✅ CEK</button>
            <button class="btn btn-info" id="showAllAnswersBtn">📋 KUNCI JAWABAN</button>
            <button class="btn btn-warning" id="resetBtn">🔄RESET</button>
        </div>
    </div>

    <div class="quiz-grid" id="quizGrid"></div>
    
    <div class="footer-note">
        💡 Pilih jawaban → klik CEK untuk pembahasan • Jawaban otomatis tersimpan
    </div>
</div>

<div id="answerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📋 KUNCI JAWABAN</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div id="answerListContainer" class="answer-list"></div>
            <button class="btn btn-primary" id="copyAnswersBtn" style="margin-top:12px; width:100%;">📋 SALIN</button>
        </div>
    </div>
</div>

<div class="scroll-top" id="scrollTopBtn">↑</div>
<div id="toast-save" class="toast-save">💾 Tersimpan</div>

<script>
    // DATA SOAL (20 soal + 20 duplikasi = 40)
    const soalData = [
        { id: 1, kompetensi: "Pemahaman Tekstual", teks: "informasi", bacaan: "Pembangunan Ibu Kota Nusantara (IKN) di Kalimantan Timur merupakan proyek strategis nasional yang bertujuan memindahkan pusat pemerintahan dari Jakarta. Proyek ini diharapkan mendorong pemerataan pembangunan.", soal: "Apa tujuan utama pemindahan IKN?", options: ["A. Mengurangi kemacetan", "B. Memindahkan pusat pemerintahan & pemerataan pembangunan", "C. Membuka lahan baru", "D. Meningkatkan pariwisata"], correct: "B", explanation: "Teks menyatakan: 'memindahkan pusat pemerintahan' dan 'mendorong pemerataan pembangunan'." },
        { id: 2, kompetensi: "Pemahaman Tekstual", teks: "fiksi", bacaan: "Matahari tenggelam. Ombak membasuh kaki Laras yang termenung. 'Ayah, kapan pulang?' bisiknya sambil memegang foto.", soal: "Apa yang dilakukan Laras?", options: ["A. Bermain pasir", "B. Menunggu ayahnya di pantai", "C. Berenang", "D. Membaca buku"], correct: "B", explanation: "Laras termenung dan bertanya 'Ayah, kapan pulang?' → menunggu ayah." },
        { id: 3, kompetensi: "Pemahaman Inferensial", teks: "informasi", bacaan: "Minat baca Indonesia hanya 0,001% berdasarkan data UNESCO.", soal: "Kesimpulan yang tepat?", options: ["A. Masyarakat gemar membaca", "B. Perlu peningkatan minat baca", "C. UNESCO tidak peduli", "D. Semua suka membaca"], correct: "B", explanation: "Data rendah → kesimpulan logis: perlu peningkatan minat baca." },
        { id: 4, kompetensi: "Evaluasi & Apresiasi", teks: "fiksi", bacaan: "'Hidup adalah pilihan. Rani memilih terus berjalan meski kakinya berat.'", soal: "Nilai yang terkandung?", options: ["A. Santai", "B. Keberanian melangkah meski sulit", "C. Berhenti", "D. Malas"], correct: "B", explanation: "Kutipan menekankan keberanian dan keteguhan hati." },
        { id: 5, kompetensi: "Pemahaman Tekstual", teks: "informasi", bacaan: "Plastik membutuhkan waktu 500 tahun untuk terurai.", soal: "Berapa tahun plastik terurai?", options: ["A. 50", "B. 100", "C. 500", "D. 1000"], correct: "C", explanation: "Teks menyebut '500 tahun'." },
        { id: 6, kompetensi: "Pemahaman Inferensial", teks: "fiksi", bacaan: "Sejak ibu pergi, Dika jarang tersenyum. Ia sering memandangi foto ibunya.", soal: "Perasaan Dika?", options: ["A. Bahagia", "B. Sedih dan rindu", "C. Marah", "D. Biasa"], correct: "B", explanation: "Jarang tersenyum dan memandangi foto → sedih dan rindu." },
        { id: 7, kompetensi: "Evaluasi & Apresiasi", teks: "informasi", bacaan: "Gadget berlebihan pada anak mengganggu perkembangan sosial.", soal: "Sikap orang tua yang tepat?", options: ["A. Biarkan saja", "B. Larang total", "C. Batasi waktu & arahkan sosial", "D. Beri gadget baru"], correct: "C", explanation: "Dampak negatif → solusi bijak: batasi dan arahkan." },
        { id: 8, kompetensi: "Pemahaman Tekstual", teks: "fiksi", bacaan: "Sari dapat berbicara dengan hewan di hutan.", soal: "Keistimewaan Sari?", options: ["A. Terbang", "B. Bicara dengan hewan", "C. Menghilang", "D. Menyembuhkan"], correct: "B", explanation: "Teks menyebut 'dapat berbicara dengan hewan'." },
        { id: 9, kompetensi: "Pemahaman Inferensial", teks: "informasi", bacaan: "Suhu global meningkat akibat emisi gas rumah kaca.", soal: "Jika emisi tidak dikurangi?", options: ["A. Stabil", "B. Pemanasan makin parah", "C. Tidak berubah", "D. Semakin dingin"], correct: "B", explanation: "Penyebab tidak dikurangi → dampak akan memburuk." },
        { id: 10, kompetensi: "Evaluasi & Apresiasi", teks: "fiksi", bacaan: "Laskar Pelangi mengajarkan semangat belajar dalam keterbatasan.", soal: "Nilai utama novel?", options: ["A. Materialisme", "B. Individualisme", "C. Semangat juang", "D. Kekayaan"], correct: "C", explanation: "Laskar Pelangi terkenal dengan pesan semangat belajar." },
        { id: 11, kompetensi: "Pemahaman Tekstual", teks: "informasi", bacaan: "Kampung Batik Laweyan: wisata edukasi membatik.", soal: "Aktivitas di sana?", options: ["A. Belanja impor", "B. Belajar membatik", "C. Bermain air", "D. Sirkus"], correct: "B", explanation: "Teks: 'belajar membatik langsung dari pengrajin'." },
        { id: 12, kompetensi: "Pemahaman Inferensial", teks: "fiksi", bacaan: "Setiap malam terdengar langkah kaki di loteng, tapi tak ada siapa pun.", soal: "Perasaan Andi?", options: ["A. Senang", "B. Takut/penasaran", "C. Biasa", "D. Marah"], correct: "B", explanation: "Suara misterius → menimbulkan rasa takut atau penasaran." },
        { id: 13, kompetensi: "Evaluasi & Apresiasi", teks: "informasi", bacaan: "Makan Siang Gratis perlu pengawasan ketat.", soal: "Pernyataan logis?", options: ["A. Pasti gagal", "B. Baik tapi perlu pengawasan", "C. Tidak penting", "D. Dana dialihkan"], correct: "B", explanation: "Evaluasi seimbang: tujuan baik, perlu pengawasan." },
        { id: 14, kompetensi: "Pemahaman Tekstual", teks: "fiksi", bacaan: "15 tahun Rina merantau, kini pulang.", soal: "Lama merantau?", options: ["A. 5", "B. 10", "C. 15", "D. 20"], correct: "C", explanation: "'Lima belas tahun' → 15 tahun." },
        { id: 15, kompetensi: "Pemahaman Inferensial", teks: "informasi", bacaan: "Harga cabai naik akibat gagal panen.", soal: "Dampak langsung?", options: ["A. Petani kaya", "B. Beban belanja masyarakat naik", "C. Cabai murah", "D. Tidak ada dampak"], correct: "B", explanation: "Harga naik → daya beli turun → beban belanja naik." },
        { id: 16, kompetensi: "Evaluasi & Apresiasi", teks: "fiksi", bacaan: "'Rindu yang tak sampai, menjadi luka menganga.'", soal: "Majas yang digunakan?", options: ["A. Personifikasi", "B. Hiperbola", "C. Metafora", "D. Litotes"], correct: "C", explanation: "Perbandingan implisit (rindu = luka) → metafora." },
        { id: 17, kompetensi: "Pemahaman Tekstual", teks: "informasi", bacaan: "Perpusnas punya koleksi lebih dari 4 juta buku.", soal: "Jumlah koleksi?", options: ["A. 1 juta", "B. 2 juta", "C. 3 juta", "D. Lebih 4 juta"], correct: "D", explanation: "'lebih dari 4 juta' → D." },
        { id: 18, kompetensi: "Pemahaman Inferensial", teks: "fiksi", bacaan: "Langkah gontai, mata sayu, napas panjang.", soal: "Kondisi tokoh?", options: ["A. Semangat", "B. Lelah/sedih", "C. Bahagia", "D. Terburu"], correct: "B", explanation: "Deskripsi fisik → kelelahan atau kesedihan." },
        { id: 19, kompetensi: "Evaluasi & Apresiasi", teks: "informasi", bacaan: "Hoaks cepat menyebar, perlu literasi digital.", soal: "Sikap terbaik?", options: ["A. Langsung bagikan", "B. Cek kebenaran dulu", "C. Abaikan semua", "D. Buat hoaks baru"], correct: "B", explanation: "Literasi digital → verifikasi sebelum membagikan." },
        { id: 20, kompetensi: "Pemahaman Tekstual", teks: "fiksi", bacaan: "Rindu merindukan suasana desa yang tenang.", soal: "Apa yang dirindukan?", options: ["A. Keramaian", "B. Suasana desa tenang", "C. Mall", "D. Pantai"], correct: "B", explanation: "'merindukan suasana desa yang tenang'." }
    ];

    // Duplikasi sampai 40 soal
    while(soalData.length < 40) {
        let base = soalData[soalData.length % 20];
        let newId = soalData.length + 1;
        soalData.push({ ...base, id: newId, soal: base.soal });
    }

    // State
    let userAnswers = {};
    let answerStatus = {};

    function loadStorage() {
        let saved = localStorage.getItem('bindo_answers');
        let savedStatus = localStorage.getItem('bindo_status');
        if(saved) userAnswers = JSON.parse(saved);
        if(savedStatus) answerStatus = JSON.parse(savedStatus);
        for(let i=1;i<=40;i++) {
            if(!userAnswers[i]) userAnswers[i] = "";
            if(answerStatus[i] === undefined) answerStatus[i] = false;
        }
    }

    function saveStorage() {
        localStorage.setItem('bindo_answers', JSON.stringify(userAnswers));
        localStorage.setItem('bindo_status', JSON.stringify(answerStatus));
        let toast = document.getElementById('toast-save');
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 800);
    }

    function updateScore() {
        let correct = 0;
        for(let i=1;i<=40;i++) if(answerStatus[i]) correct++;
        document.getElementById('liveScoreDisplay').innerHTML = `🏆 ${correct}/40`;
    }

    function evaluate(id) {
        let q = soalData.find(x=>x.id===id);
        let jawab = userAnswers[id];
        if(!jawab) {
            document.getElementById(`fb_${id}`).innerHTML = `<div class="result-warning">⚠️ Pilih jawaban dulu</div>`;
            return;
        }
        let benar = (jawab === q.correct);
        answerStatus[id] = benar;
        saveStorage();
        let fb = document.getElementById(`fb_${id}`);
        fb.innerHTML = (benar ? `<div class="result-correct">✅ BENAR! Jawaban: ${jawab}</div>` : `<div class="result-wrong">❌ SALAH! Jawaban: ${jawab} | Kunci: ${q.correct}</div>`) + `<div class="explanation-box">📘 ${q.explanation}</div>`;
        updateScore();
    }

    function showPembahasan(id) {
        let q = soalData.find(x=>x.id===id);
        document.getElementById(`fb_${id}`).innerHTML = `<div class="explanation-box">📘 ${q.explanation}</div>`;
    }

    function resetAll() {
        for(let i=1;i<=40;i++) {
            userAnswers[i] = "";
            answerStatus[i] = false;
            let radios = document.getElementsByName(`q${i}`);
            radios.forEach(r => r.checked = false);
            document.getElementById(`fb_${i}`).innerHTML = "";
        }
        saveStorage();
        updateScore();
    }

    function checkAll() {
        for(let i=1;i<=40;i++) evaluate(i);
    }

    function showKunci() {
        let modal = document.getElementById('answerModal');
        let container = document.getElementById('answerListContainer');
        container.innerHTML = soalData.map(q => `<div class="answer-item"><span>${q.id}</span><span><strong>${q.correct}</strong></span></div>`).join('');
        modal.style.display = 'flex';
    }

    function copyKunci() {
        let text = "KUNCI JAWABAN B.INDONESIA\n\n";
        soalData.forEach(q => { text += `${q.id}. ${q.correct}\n`; });
        navigator.clipboard.writeText(text);
        alert("✅ Disalin!");
    }

    function render() {
        let grid = document.getElementById('quizGrid');
        grid.innerHTML = '';
        soalData.forEach(q => {
            let card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="num-badge">${q.id}</div>
                    <div class="kompetensi-tag">📌 ${q.kompetensi}</div>
                    <div class="teks-tag">📄 ${q.teks === 'informasi' ? 'Info' : 'Fiksi'}</div>
                </div>
                <div class="reading-text">📖 ${q.bacaan}</div>
                <div class="question-text">❓ ${q.soal}</div>
                <div class="options" id="opt_${q.id}"></div>
                <div class="button-group-vertical">
                    <button class="check-btn" onclick="evaluate(${q.id})">✅ CEK JAWABAN</button>
                    <button class="pembahasan-btn" onclick="showPembahasan(${q.id})">📖 PEMBAHASAN</button>
                </div>
                <div class="feedback-area" id="fb_${q.id}"></div>
            `;
            grid.appendChild(card);
            let optDiv = document.getElementById(`opt_${q.id}`);
            q.options.forEach(opt => {
                let letter = opt[0];
                let div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<input type="radio" name="q${q.id}" value="${letter}" id="q${q.id}_${letter}" ${userAnswers[q.id]===letter ? 'checked' : ''}><label for="q${q.id}_${letter}">${opt}</label>`;
                div.querySelector('input').addEventListener('change', (e) => {
                    userAnswers[q.id] = e.target.value;
                    answerStatus[q.id] = false;
                    saveStorage();
                    updateScore();
                });
                optDiv.appendChild(div);
            });
            if(userAnswers[q.id] && answerStatus[q.id]) evaluate(q.id);
        });
    }

    // Splash screen
    window.addEventListener('load', () => {
        setTimeout(() => {
            let splash = document.getElementById('splash-screen');
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 500);
        }, 2000);
    });

    loadStorage();
    render();
    updateScore();

    document.getElementById('checkAllBtn')?.addEventListener('click', checkAll);
    document.getElementById('resetBtn')?.addEventListener('click', resetAll);
    document.getElementById('showAllAnswersBtn')?.addEventListener('click', showKunci);
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('answerModal').style.display = 'none');
    document.getElementById('copyAnswersBtn')?.addEventListener('click', copyKunci);
    document.getElementById('scrollTopBtn')?.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
</script>
</body>
</html>
